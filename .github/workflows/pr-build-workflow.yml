name: PR Build

on: pull_request

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    if: github.repository == 'spring-projects/spring-ldap'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Determine JDK version
        id: jdk
        run: |
          if [ "${{ github.base_ref }}" == "main" ]; then
            echo "version=25" >> $GITHUB_OUTPUT
          else
            echo "version=17" >> $GITHUB_OUTPUT
          fi
      - name: Set up JDK ${{ steps.jdk.outputs.version }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ steps.jdk.outputs.version }}
          distribution: 'temurin'
          cache: 'gradle'
      - name: Cache Gradle packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
      - name: Build with Gradle
        run: ./gradlew clean build --no-daemon --stacktrace
